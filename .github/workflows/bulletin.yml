name: Hourly News Bulletin Producer
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  produce-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4 for Node 24 support

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install openai requests

      - name: Run AI News Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Ensure your python script saves the file as 'bulletin.mp3' in the root folder
          python your_bulletin_script.py 

      - name: Verify Bulletin Exists
        run: |
          if [ -f "bulletin.mp3" ]; then
            echo "File generated successfully."
          else
            echo "Error: bulletin.mp3 was not found! Check your Python script output."
            exit 1
          fi

      - name: Upload to AzuraCast Media
        env:
          AZURA_KEY: ${{ secrets.AZURACAST_API_KEY }}
          STATION_ID: "51"
        run: |
          curl --location --request POST "https://azuracast-nuremberg.myautodj.com/api/station/${{ env.STATION_ID }}/files/upload" \
          --header "X-API-Key: ${{ env.AZURA_KEY }}" \
          --form 'path="bulletin.mp3"' \
          --form 'file=@"bulletin.mp3"'
