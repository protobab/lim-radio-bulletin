name: Music Library Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-music:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated version

      - name: Setup Node
        uses: actions/setup-node@v4 # Updated version
        with:
          node-version: '24' # Using the newest Node version

      - name: Run Music Sync
        run: node music_sync.js
        env:
          AZ_URL: ${{ secrets.AZ_URL }}
          AZ_KEY: ${{ secrets.AZ_KEY }}
          AZ_STATION_ID: ${{ secrets.AZ_STATION_ID }}
