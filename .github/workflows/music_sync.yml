name: Music Library Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows GitHub to save the file
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node music_engine.js
      - name: Commit and Push M3U
        run: |
          git config --global user.name "Abiola Hassan Chidi"
          git config --global user.email "bot@livesinmotion.com"
          git add *.m3u
          git commit -m "Refresh Daily Music" || exit 0
          git push
