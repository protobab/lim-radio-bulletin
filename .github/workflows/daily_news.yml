name: Daily News Bulletin

on:
  schedule:
    - cron: '0 6,12,16,20 * * *' # 7am, 1pm, 5pm, 9pm WAT
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/checkout@v3
        with:
          node-version: '18'

      - name: Run Bulletin Engine
        run: node engine.js
        env:
          AZ_URL: ${{ secrets.AZ_URL }}
          AZ_KEY: ${{ secrets.AZ_KEY }}
          AZ_STATION_ID: ${{ secrets.AZ_STATION_ID }}
          AZ_PLAYLIST_ID: ${{ secrets.AZ_PLAYLIST_ID }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
