name: Daily News Bulletin

on:
  schedule:
    - cron: '0 6,12,16,20 * * *' # 7am, 1pm, 5pm, 9pm WAT
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/checkout@v3
        with:
          node-version: '18'

      - name: Run Bulletin Engine
        run: node engine.js
        env:
          AZ_URL: ${{ secrets.AZ_URL }}
          AZ_KEY: ${{ secrets.AZ_KEY }}
          AZ_STATION_ID: ${{ secrets.AZ_STATION_ID }}
          AZ_PLAYLIST_ID: ${{ secrets.AZ_PLAYLIST_ID }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}

- name: Upload to AzuraCast
  env:
    AZURA_KEY: ${{ secrets.083d81f9269afb72:16b990c979926a32f67273c6329b1eb2 }}
    STATION_ID: 51 # Your Station ID
  run: |
    curl --location --request POST 'https://azuracast-nuremberg.myautodj.com/api/station/${{ env.STATION_ID }}/files/upload' \
    --header "X-API-Key: ${{ env.AZURA_KEY }}" \
    --form 'path="bulletin.mp3"' \
    --form 'file=@"output/bulletin.mp3"'
